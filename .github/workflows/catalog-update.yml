name: Catalog Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  catalog-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - run: bun install
      - run: bun run catalog:refresh
