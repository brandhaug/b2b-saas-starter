name: Catalog Update

# TEMPLATE — not scheduled. `bun run catalog:refresh` currently runs against
# the in-memory Seed adapter and persists nothing, so a cron run would be a
# no-op. Wire the script to the remote D1 database (Live adapter + Cloudflare
# credentials) before re-enabling a schedule, e.g.:
#
#   schedule:
#     - cron: '0 6 * * *'
on:
  workflow_dispatch:

jobs:
  catalog-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run catalog:refresh
