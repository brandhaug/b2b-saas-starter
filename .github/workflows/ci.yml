name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run format:check
      # Includes the coverage ratchet on the application layer: the
      # capabilities `test` script runs with --coverage (thresholds live in
      # packages/capabilities/vitest.config.ts) — fails on decay.
      - run: bun run test
      # Fail only on high/critical advisories; lower severities still print.
      - run: bun audit --audit-level=high
      - run: bun run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bunx playwright install --with-deps chromium
      # Playwright's webServer config (apps/web/playwright.config.ts) starts
      # `bun run dev` on :3071 itself — no separate server step needed.
      - run: bun run test:e2e

  deploy:
    if: github.event_name == 'workflow_dispatch'
    needs: [ci, e2e]
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_TRUSTED_ORIGINS: ${{ secrets.BETTER_AUTH_TRUSTED_ORIGINS }}
          # Optional — the SendEmail binding is skipped when unset (alchemy.run.ts).
          CLOUDFLARE_EMAIL_FROM: ${{ secrets.CLOUDFLARE_EMAIL_FROM }}
          # GitHub Actions forbids secret names starting with GITHUB_, so the
          # repo secrets are named GH_OAUTH_* and mapped to the env var names
          # alchemy.run.ts reads.
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
